<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin — Gestor Alan Costa</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --card: #14141f;
            --border: #252540;
            --text: #e0e0e0;
            --muted: #8888aa;
            --accent: #7c5cfc;
            --accent2: #00d4aa;
            --red: #ff4757;
            --yellow: #ffa502;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:var(--bg); color:var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height:100vh; }
        
        .login-container {
            display:flex; align-items:center; justify-content:center; min-height:100vh;
        }
        .login-card {
            background:var(--card); border:1px solid var(--border); border-radius:16px;
            padding:40px; width:380px;
        }
        .login-card h1 { font-size:24px; margin-bottom:8px; color:white; }
        .login-card p { color:var(--muted); margin-bottom:24px; font-size:14px; }
        .login-card input {
            width:100%; padding:12px; border-radius:8px; border:1px solid var(--border);
            background:var(--bg); color:white; font-size:14px; margin-bottom:12px;
        }
        .login-card button {
            width:100%; padding:12px; border-radius:8px; border:none;
            background:var(--accent); color:white; font-size:15px; font-weight:600; cursor:pointer;
        }
        .login-card .error { color:var(--red); font-size:13px; margin-top:12px; }
        
        .layout { display:flex; min-height:100vh; }
        .sidebar {
            width:240px; background:var(--card); border-right:1px solid var(--border);
            padding:20px 0; position:fixed; top:0; left:0; bottom:0;
        }
        .sidebar h2 { padding:0 20px 20px; font-size:18px; color:white; border-bottom:1px solid var(--border); margin-bottom:12px; }
        .sidebar a {
            display:block; padding:10px 20px; color:var(--muted); text-decoration:none;
            font-size:14px; transition:all .2s;
        }
        .sidebar a:hover, .sidebar a.active { color:white; background:rgba(124,92,252,.1); border-left:3px solid var(--accent); }
        .sidebar .logout { margin-top:20px; border-top:1px solid var(--border); padding-top:12px; }
        .sidebar .logout a { color:var(--red); }
        
        .main { margin-left:240px; padding:32px; width:calc(100% - 240px); }
        .main h1 { font-size:28px; color:white; margin-bottom:8px; }
        .main .subtitle { color:var(--muted); font-size:14px; margin-bottom:32px; }
        
        .grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(300px,1fr)); gap:20px; }
        .card {
            background:var(--card); border:1px solid var(--border); border-radius:12px;
            padding:24px;
        }
        .card h3 { font-size:16px; color:white; margin-bottom:8px; }
        .card .meta { color:var(--muted); font-size:12px; margin-bottom:12px; }
        .card .score {
            display:inline-block; padding:4px 10px; border-radius:20px; font-size:12px; font-weight:600;
        }
        .score-alta { background:rgba(0,212,170,.15); color:var(--accent2); }
        .score-media { background:rgba(255,165,2,.15); color:var(--yellow); }
        .score-baixa { background:rgba(255,71,87,.15); color:var(--red); }
        
        .tabs { display:flex; gap:0; margin-bottom:24px; border-bottom:2px solid var(--border); }
        .tabs button {
            padding:10px 20px; border:none; background:none; color:var(--muted);
            font-size:14px; cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-2px;
        }
        .tabs button.active { color:white; border-bottom-color:var(--accent); }
        
        .badge {
            display:inline-block; padding:2px 8px; border-radius:12px; font-size:11px; font-weight:600;
        }
        .badge-nova { background:rgba(124,92,252,.2); color:var(--accent); }
        .badge-aprovado { background:rgba(0,212,170,.2); color:var(--accent2); }
        .badge-rejeitado { background:rgba(255,71,87,.2); color:var(--red); }
        .badge-rascunho { background:rgba(136,136,170,.2); color:var(--muted); }
        
        button.btn {
            padding:8px 16px; border-radius:8px; border:none; font-size:13px; font-weight:600;
            cursor:pointer; margin-right:8px;
        }
        .btn-primary { background:var(--accent); color:white; }
        .btn-success { background:var(--accent2); color:#0a0a0f; }
        .btn-danger { background:var(--red); color:white; }
        .btn-outline { background:transparent; border:1px solid var(--border); color:var(--text); }
        
        .loading { text-align:center; padding:40px; color:var(--muted); }
        .sugestoes { margin-top:12px; }
        .sugestoes li { color:var(--yellow); font-size:13px; margin-bottom:4px; }
        
        table { width:100%; border-collapse:collapse; }
        th { text-align:left; padding:12px 8px; font-size:12px; color:var(--muted); border-bottom:1px solid var(--border); }
        td { padding:12px 8px; font-size:13px; border-bottom:1px solid var(--border); }
    </style>
</head>
<body>
    {% block content %}{% endblock %}
</body>
</html>
